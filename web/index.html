<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PasteSync</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#efe7da">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="statusbar">
        <div class="title">PasteSync</div>
        <div id="status" class="status" data-state="saving" aria-live="polite">Connecting</div>
      </header>
      <textarea id="editor" class="editor" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" placeholder="Paste here" readonly></textarea>
      <footer class="footer">
        <div class="actions" aria-label="Clipboard actions">
          <button id="copyButton" class="action" type="button">Copy</button>
          <button id="clearButton" class="action" type="button">Clear</button>
        </div>
        <span id="meta">Auto-clear after inactivity</span>
      </footer>
    </main>
    <script src="/app.js" defer></script>
  </body>
  </html>
