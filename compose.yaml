services:
  pastesync:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      PASTE_TTL: "24h"
      MAX_BODY_BYTES: "262144"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  gofmt:
    build:
      context: .
      target: base
    network_mode: none
    volumes:
      - .:/src
    working_dir: /src
    entrypoint: ["gofmt"]
